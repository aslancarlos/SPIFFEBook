site_name: SPIFFE e SPIRE - Tradução PT-BR
site_description: Tradução completa em português brasileiro do livro "Solving the Bottom Turtle"
site_author: Aslan Carlos M. Ramos
site_url: https://spiffe-spire-pt-br.readthedocs.io/
repo_url: https://github.com/seu-usuario/spiffe-spire-pt-br
repo_name: spiffe-spire-pt-br
edit_uri: edit/main/docs/

# Language and locale
language: pt-BR
locale: pt_BR

# Theme configuration
theme:
  name: material
  language: pt
  logo: assets/logo.png
  favicon: assets/favicon.png
  
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Modo claro
  
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.emoji
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Plugins
plugins:
  - search:
      lang: pt
  - minify:
      minify_html: true

# Navigation structure
nav:
  - Home: index.md
  - Notas de Tradução: notas-traducao.md
  - Prólogo: 00-prologo.md
  - Capítulo 1: Introdução aos Conceitos de SPIFFE e SPIRE: 01-introducao.md
  - Capítulo 2: Benefícios: 02-beneficios.md
  - Capítulo 3: Antes de Começar: 03-antes-de-comecar.md
  - Capítulo 4: Fundamentos da Identidade de Carga de Trabalho: 04-fundamentos.md
  - Capítulo 5: O Padrão SPIFFE: 05-padrao-spiffe.md
  - Capítulo 6: Projetando uma Implantação de SPIRE: 06-projetando.md
  - Capítulo 7: Implementando SPIRE: 07-implementando.md
  - Capítulo 8: Usando Identidades SPIFFE para Informar Autorização: 08-autorizacao.md
  - Capítulo 9: Comparando SPIFFE com Outras Tecnologias: 09-comparacao.md
  - Capítulo 10: Histórias de Praticantes: 10-praticantes.md
  - Glossário: glossario.md
  - Notas e Referências: notas-referencias.md
  - Epílogo: epílogo.md
  - Sobre a Tradução: sobre.md

# Copyright
copyright: >
  Copyright © 2024. Tradução em português por Aslan Carlos M. Ramos.
  Obra original "Solving the Bottom Turtle" © 2020 pela CNCF.
  Licenciado sob Creative Commons Attribution 4.0 International.

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/seu-usuario/spiffe-spire-pt-br
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/seu-perfil
  version:
    provider: mike
