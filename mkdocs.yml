site_name: SPIFFE e SPIRE - Tradução PT-BR
site_description: Tradução completa em português brasileiro do livro "Solving the Bottom Turtle"
site_author: Aslan Carlos M. Ramos
site_url: https://spiffebook.readthedocs.io/
repo_url: https://github.com/aslancarlos/SPIFFEBook
repo_name: aslancarlos/SPIFFEBook
edit_uri: edit/main/docs/

docs_dir: docs

# Theme configuration
theme:
  name: material
  language: pt

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Modo escuro

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Modo claro

  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Plugins
plugins:
  - search:
      lang: pt
  - minify:
      minify_html: true

# Navigation structure
nav:
  - Início: index.md
  - O Livro:
      - Notas de Tradução: livro/notas-traducao.md
      - Sobre Zero, a Tartaruga: livro/sobre-zero.md
      - 1. História e Motivação para o SPIFFE: livro/01-historia-e-motivacao.md
      - 2. Benefícios: livro/02-beneficios.md
      - 3. Conceitos Gerais de Identidade: livro/03-conceitos-de-identidade.md
      - 4. Introdução aos Conceitos SPIFFE e SPIRE: livro/04-introducao-spiffe-spire.md
      - 5. Antes de Começar: livro/05-antes-de-comecar.md
      - 6. Projetando uma Implantação SPIRE: livro/06-projetando-implantacao-spire.md
      - 7. Integrando com Outros: livro/07-integrando-com-outros.md
      - 8. Usando Identidades SPIFFE para Informar a Autorização: livro/08-informar-autorizacao.md
      - 9. Comparando SPIFFE com Outras Tecnologias: livro/09-comparando-tecnologias.md
      - 10. Histórias de Profissionais: livro/10-historias-de-profissionais.md
      - Glossário (do livro): livro/glossario.md
      - Epílogo: livro/epilogo.md
  - Projeto:
      - Glossário de Tradução (EN → pt-BR): glossario.md
      - Como Contribuir: contribuindo.md
      - Atribuição e Licença: atribuicao.md
      - Changelog: changelog.md
      - Sobre: sobre.md

# Copyright
copyright: >
  Copyright © 2024. Tradução em português por Aslan Carlos M. Ramos.
  Obra original "Solving the Bottom Turtle" © 2020 pela CNCF.
  Licenciado sob Creative Commons Attribution 4.0 International.

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aslancarlos/SPIFFEBook
